    body {

    a { color: inherit; text-decoration: none; }

    .page {

    .toast {

    @media (max-width: 1024px) {

    @media (max-width: 720px) {
      .page {
        width: min(100vw - 16px, 100%);

      }

      .card-note,
      .card-body {

        padding-right: 16px;
      }

      .hero {
        padding-top: 20px;
        padding-bottom: 20px;
      }

      .form-row,
      .board-head,
      .board-row {
        grid-template-columns: 1fr;
      }

      .board-head {
        display: none;
      }

      .board-row {
        gap: 8px;
      }

      .board-meta::before {
        content: attr(data-label);
        display: inline-block;
        min-width: 58px;
        font-weight: 700;
        color: var(--text);
        margin-right: 6px;
      }
    }
  </style>

  <script>
    const APP_VERSION = 'v2026.06.03-02';
    const FEEDBACK_ADMIN_EMAIL = 'luck2s7912@gmail.com';
    const state = {
      supa: null,
      currentUser: null,
      posts: [],
      pendingImages: [],
      selectedPostId: new URLSearchParams(window.location.search).get('post') || '',
      authMode: 'login',
      loadingPosts: false,
      draft: {
        title: '',
        body: '',
        category: 'bug'
      }
    };

    const el = {
      accountBadges: document.getElementById('accountBadges'),
      accountNote: document.getElementById('accountNote'),
      accountPanel: document.getElementById('accountPanel'),
      composerPanel: document.getElementById('composerPanel'),
      boardScopeBadge: document.getElementById('boardScopeBadge'),
      boardPanel: document.getElementById('boardPanel'),
      detailPanel: document.getElementById('detailPanel'),
      toastWrap: document.getElementById('toastWrap'),
      appVersion: document.getElementById('appVersion')
    };

    el.appVersion.textContent = APP_VERSION;

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function isAdmin() {
      return String(state.currentUser?.email || '').toLowerCase() === FEEDBACK_ADMIN_EMAIL;
    }

    function statusLabel(status) {
      const map = {
        new: '?묒닔',
        reviewing: '寃?좎쨷',
        planned: '諛섏쁺 ?덉젙',
        answered: '?듬? ?꾨즺',
        closed: '醫낅즺'
      };
      return map[status] || '?묒닔';
    }

    function categoryLabel(category) {
      const map = {
        bug: '?ㅻ쪟',
        ux: '?ъ슜??,
        feature: '湲곕뒫 ?쒖븞',
        content: '臾멸뎄/肄섑뀗痢?,
        other: '湲고?'
      };
      return map[category] || '湲고?';
    }

    function formatDate(value) {
      if (!value) return '-';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value).slice(0, 16).replace('T', ' ');
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
    }

    function parseImages(value) {
      if (Array.isArray(value)) return value;
      if (!value) return [];
      try {
        const parsed = JSON.parse(value);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function getSupabaseProjectRef() {
      try {
        const url = state.supa?.supabaseUrl || '';
        return new URL(url).hostname.split('.')[0] || '';
      } catch (error) {
        return '';
      }
    }

    function formatSetupMessage(message = '') {
      const raw = String(message || '').trim();
      const projectRef = getSupabaseProjectRef();
      if (raw.includes('PGRST205') || raw.includes("Could not find the table 'public.feedback_posts'")) {
        const parts = [
          '?꾩옱 ?곌껐??Supabase ?꾨줈?앺듃??`public.feedback_posts` ?뚯씠釉붿씠 ?놁뒿?덈떎.',
          projectRef ? `?꾨줈?앺듃 ID: ${projectRef}` : '',
          '愿由ъ옄?????꾨줈?앺듃??Supabase SQL Editor?먯꽌 `supabase-feedback.sql` ?꾩껜瑜???踰??ㅽ뻾?댁＜?몄슂.'
        ].filter(Boolean);
        return parts.join('<br>');
      }
      return escapeHtml(raw);
    }

    function showSetupMessage(message) {
      return `<div class="setup-box">${formatSetupMessage(message)}</div>`;
    }

    function toast(message, type = 'info') {
      const node = document.createElement('div');
      node.className = `toast ${type}`;
      node.textContent = message;
      el.toastWrap.appendChild(node);
      window.setTimeout(() => {
        node.remove();
      }, 3200);
    }

    function updateSelectedUrl(postId) {
      const url = new URL(window.location.href);
      if (postId) {
        url.searchParams.set('post', postId);
      } else {
        url.searchParams.delete('post');
      }
      window.history.replaceState({}, '', url);
    }

    function selectPost(postId) {
      state.selectedPostId = postId || '';
      updateSelectedUrl(state.selectedPostId);
      renderBoard();
      renderDetail();
    }

    function getSelectedPost() {
      return state.posts.find(post => post.id === state.selectedPostId) || null;
    }

    function setAuthMode(mode) {
      state.authMode = mode === 'signup' ? 'signup' : 'login';
      renderAccountPanel();
    }

    function captureDraft() {
      const titleEl = document.getElementById('feedbackTitle');
      const bodyEl = document.getElementById('feedbackBody');
      const categoryEl = document.getElementById('feedbackCategory');
      if (titleEl) state.draft.title = titleEl.value;
      if (bodyEl) state.draft.body = bodyEl.value;

    async function compressImage(file) {
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      const image = await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = dataUrl;
      });

      const maxSide = 1200;
      const ratio = Math.min(1, maxSide / Math.max(image.width, image.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(image.width * ratio));
      canvas.height = Math.max(1, Math.round(image.height * ratio));
      const ctx = canvas.getContext('2d');
      ctx.drawImage(image, 0, 0, canvas.width, canvas.height);

      return {
        name: file.name,
        type: 'image/jpeg',
        size: file.size,
        dataUrl: canvas.toDataURL('image/jpeg', 0.78),
        createdAt: new Date().toISOString()
      };
    }
